{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Monagua</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    
    <style>
        :root {
            --verde-monagua: #406d46;
            --verde-hover: #2e4f32;
        }

        .btn-custom-green {
            background-color: var(--verde-monagua);
            color: white;
        }

        .btn-custom-green:hover {
            background-color: var(--verde-hover);
            color: white;
        }

        .text-custom-green {
            color: var(--verde-monagua) !important;
        }

        .glass-effect {
            backdrop-filter: blur(12px);
        }

        /* Estilos para la barra de navegación de la captura */
        .auth-nav {
            border-bottom: 1px solid #dee2e6;
        }

        .auth-nav-item {
            color: #adb5bd;
            text-decoration: none;
            font-weight: 600;
            padding-bottom: 8px;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
        }

        .auth-nav-item:hover {
            color: var(--verde-monagua);
        }

        .auth-nav-item.active {
            color: #212529;
            border-bottom-color: #212529; /* Línea negra como en tu captura */
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--verde-monagua);
            box-shadow: 0 0 0 0.25rem rgba(64, 109, 70, 0.25);
        }
    </style>
</head>

<body class="d-flex flex-column justify-content-center align-items-center vh-100 overflow-hidden"
    style="background: url('{% static 'img/Fondo.jpg' %}') no-repeat center center fixed; background-size: cover;">
    
    <div id="tarjetaRegistro" 
         class="card p-4 rounded-4 border-0 shadow-lg bg-white w-100" 
         style="max-width: 420px;">

        <div class="text-center mb-4">
            <img src="{% static 'img/Logo.png' %}" class="img-fluid w-50 h-auto mb-2" style="max-height: 60px; object-fit: contain;">
            <h4 class="fw-bold text-dark mb-1">Bienvenido</h4>
            <small class="text-muted d-block">Ingresa tus datos para acceder a tu experiencia.</small>
        </div>

        <div class="d-flex justify-content-center gap-4 auth-nav mb-4">
            <a href="/login/" class="auth-nav-item">Iniciar Sesión</a>
            <a href="#" class="auth-nav-item active">Regístrate</a>
        </div>

        <form id="formularioRegistro" method="POST">
            {% csrf_token %}

            <div class="row g-2 mb-2">
                <div class="col-6">
                    <input type="text" name="nombres" class="form-control rounded-pill border-secondary-subtle py-2 shadow-sm" placeholder="Nombres" required>
                </div>
                <div class="col-6">
                    <input type="text" name="apellidos" class="form-control rounded-pill border-secondary-subtle py-2 shadow-sm" placeholder="Apellidos" required>
                </div>
            </div>

            <div class="mb-2">
                <select name="tipo_documento" class="form-select rounded-pill border-secondary-subtle py-2 shadow-sm text-secondary" required>
                    <option value="" selected disabled>Tipo De Documento</option>
                    <option value="CC">Cédula de Ciudadanía</option>
                    <option value="TI">Tarjeta de Identidad</option>
                    <option value="Pasaporte">Pasaporte</option>
                </select>
            </div>

            <div class="mb-2">
                <input type="number" name="numero_documento" class="form-control rounded-pill border-secondary-subtle py-2 shadow-sm" placeholder="Número de Documento" required>
            </div>

            <div class="mb-2">
                <input type="email" name="correo" class="form-control rounded-pill border-secondary-subtle py-2 shadow-sm" placeholder="Correo Electrónico" required>
            </div>

            <div class="mb-2">
                <input type="password" id="pass1" name="password" class="form-control rounded-pill border-secondary-subtle py-2 shadow-sm" placeholder="Contraseña" required minlength="6">
            </div>

            <div class="mb-4">
                <input type="password" id="pass2" class="form-control rounded-pill border-secondary-subtle py-2 shadow-sm" placeholder="Confirmar Contraseña" required minlength="6">
            </div>

            <div id="mensajeError" class="alert alert-danger py-1 px-2 text-center d-none mb-3 fw-medium" role="alert" style="font-size: 0.8rem;">
                Las contraseñas no coinciden.
            </div>

            <button type="submit" class="btn btn-custom-green w-100 rounded-pill py-2 fw-bold shadow-sm mb-2">
                Crear Cuenta
            </button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const formulario = document.getElementById('formularioRegistro');
        const mensajeError = document.getElementById('mensajeError');

        formulario.addEventListener('submit', (event) => {
            event.preventDefault();
            const pass1 = document.getElementById('pass1').value;
            const pass2 = document.getElementById('pass2').value;

            if (pass1 !== pass2) {
                mensajeError.classList.remove('d-none');
            } else {
                mensajeError.classList.add('d-none');
                formulario.submit(); 
            }
        });
    </script>
</body>
</html>
