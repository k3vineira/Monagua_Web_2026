{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Monagua</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    
    <style>
        :root {
            --verde-monagua: #406d46;
            --verde-hover: #2e4f32;
        }

        body {
            background: url('{% static "img/Fondo.jpg" %}') no-repeat center center fixed;
            background-size: cover;
        }

        .btn-custom-green {
            background-color: var(--verde-monagua);
            color: white;
            transition: all 0.3s ease;
        }

        .btn-custom-green:hover {
            background-color: var(--verde-hover);
            color: white;
        }

        .auth-nav {
            border-bottom: 1px solid #dee2e6;
            margin-bottom: 1rem;
        }

        .auth-nav-item {
            color: #adb5bd;
            text-decoration: none;
            font-weight: 600;
            padding-bottom: 4px;
            border-bottom: 3px solid transparent;
            font-size: 0.9rem;
        }

        .auth-nav-item.active {
            color: #212529;
            border-bottom-color: #212529;
        }

        .divider-vertical {
            border-right: 2px solid #dee2e6;
        }

        .form-control, .form-select {
            font-size: 0.85rem;
            padding: 0.5rem 1rem;
        }

        /* Modal personalizado */
        .modal-registro .modal-dialog {
            max-width: 850px;
        }

        .modal-registro .modal-content {
            border-radius: 1rem;
            border: 0;
            box-shadow: 0 1rem 3rem rgba(0, 0, 0, 0.3);
        }

        .modal-registro .modal-body {
            padding: 2rem;
        }

        /* Backdrop más oscuro para resaltar el modal */
        .modal-backdrop.show {
            opacity: 0.6;
        }

        @media (max-height: 720px) {
            .modal-registro .modal-body { padding: 1.25rem; }
            img { max-height: 55px !important; }
            h4 { font-size: 1.1rem; }
        }
    </style>
</head>

<body>

    <!-- El modal se abre automáticamente al cargar la página -->
    <div class="modal fade modal-registro" id="modalRegistro" tabindex="-1"
         data-bs-backdrop="static" data-bs-keyboard="false" aria-labelledby="modalRegistroLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-body">

                    <!-- Encabezado -->
                    <div class="text-center mb-2">
                        <img src="{% static 'img/Logo.png' %}" class="img-fluid mb-1" style="max-height: 75px; object-fit: contain;">
                        <h4 class="fw-bold text-dark mb-0" id="modalRegistroLabel">Bienvenido</h4>
                        <p class="text-muted mb-2" style="font-size: 0.8rem;">Ingresa tus datos para acceder a tu experiencia en Monagua.</p>
                    </div>

                    <!-- Navegación Iniciar Sesión / Regístrate -->
                    <div class="d-flex justify-content-center gap-4 auth-nav mb-3">
                        <a href="/login/" class="auth-nav-item">Iniciar Sesión</a>
                        <a href="#" class="auth-nav-item active">Regístrate</a>
                    </div>

                    <!-- Formulario -->
                    <form id="formularioRegistro" method="POST">
                        {% csrf_token %}

                        <div class="row g-0">
                            <!-- Columna izquierda -->
                            <div class="col-md-6 pe-md-4 divider-vertical">
                                <div class="mb-2">
                                    <input type="text" name="nombres" class="form-control rounded-pill border-secondary-subtle shadow-sm" placeholder="Nombres" required>
                                </div>
                                <div class="mb-2">
                                    <input type="text" name="apellidos" class="form-control rounded-pill border-secondary-subtle shadow-sm" placeholder="Apellidos" required>
                                </div>
                                <div class="mb-2">
                                    <select name="tipo_documento" class="form-select rounded-pill border-secondary-subtle shadow-sm text-secondary" required>
                                        <option value="" selected disabled>Tipo De Documento</option>
                                        <option value="CC">Cédula de Ciudadanía</option>
                                        <option value="TI">Tarjeta de Identidad</option>
                                        <option value="Pasaporte">Pasaporte</option>
                                    </select>
                                </div>
                                <div class="mb-2">
                                    <input type="number" name="numero_documento" class="form-control rounded-pill border-secondary-subtle shadow-sm" placeholder="Número de Documento" required>
                                </div>
                                <div class="mb-2">
                                    <input type="text"
                                           name="telefono"
                                           class="form-control rounded-pill border-secondary-subtle shadow-sm"
                                           placeholder="Número de Teléfono"
                                           required
                                           maxlength="10"
                                           oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                                </div>
                            </div>

                            <!-- Columna derecha -->
                            <div class="col-md-6 ps-md-4">
                                <div class="mb-2">
                                    <input type="text" name="residencia" class="form-control rounded-pill border-secondary-subtle shadow-sm" placeholder="Lugar de Residencia" required>
                                </div>
                                <div class="mb-2">
                                    <input type="email" name="correo" class="form-control rounded-pill border-secondary-subtle shadow-sm" placeholder="Correo Electrónico" required>
                                </div>
                                <div class="mb-2">
                                    <input type="password" id="pass1" name="password" class="form-control rounded-pill border-secondary-subtle shadow-sm" placeholder="Contraseña" required minlength="6">
                                </div>
                                <div class="mb-2">
                                    <input type="password" id="pass2" class="form-control rounded-pill border-secondary-subtle shadow-sm" placeholder="Confirmar Contraseña" required minlength="6">
                                </div>

                                <div class="form-check mt-3">
                                    <input type="checkbox" class="form-check-input border-secondary-subtle shadow-sm" id="terminos" required>
                                    <label class="form-check-label text-muted" style="font-size: 0.8rem;" for="terminos">
                                        He leído y acepto los <a href="{% url 'terminos' %}" class="text-custom-green fw-bold text-decoration-none">Términos y Condiciones</a>
                                    </label>
                                </div>
                            </div>
                        </div>

                        <!-- Botón y error -->
                        <div class="text-center mt-3">
                            <div id="mensajeError" class="alert alert-danger py-1 d-none mb-2" style="font-size: 0.75rem;">
                                Las contraseñas no coinciden.
                            </div>
                            <button type="submit" class="btn btn-custom-green rounded-pill px-5 fw-bold shadow-sm py-2">
                                Crear Cuenta
                            </button>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Abrir el modal automáticamente al cargar la página
        const modalEl = document.getElementById('modalRegistro');
        const modal = new bootstrap.Modal(modalEl);
        modal.show();

        // Validación de contraseñas
        const formulario = document.getElementById('formularioRegistro');
        const mensajeError = document.getElementById('mensajeError');

        formulario.addEventListener('submit', (event) => {
            event.preventDefault();
            const pass1 = document.getElementById('pass1').value;
            const pass2 = document.getElementById('pass2').value;

            if (pass1 !== pass2) {
                mensajeError.classList.remove('d-none');
            } else {
                mensajeError.classList.add('d-none');
                formulario.submit();
            }
        });
    </script>
</body>
</html>
