{% load static %}
<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Monagua</title>

 <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
<link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />
     <style>
      body {
        background:
          linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)),
          url("{%  static 'img/fondo_log.jpg' %}") no-repeat;

        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
      }

      .login-card {
        background-color: white;
        width: 100%;
        max-width: 420px;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        text-align: center;
      }

      .btn-iniciar {
        background-color: #4a6d4a;
        color: white;
        border: none;
        padding: 12px;
        border-radius: 8px;
        font-weight: bold;
        transition: 0.3s;
      }

      .btn-iniciar:hover {
        background-color: #365036;
        color: white;
      }

      .nav-tabs-custom {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-bottom: 25px;
        border-bottom: 1px solid #eee;
      }

      .nav-item-custom {
        padding-bottom: 10px;
        cursor: pointer;
        font-weight: 600;
        color: #888;
        text-decoration: none;
      }

      .active-tab {
        color: #000;
        border-bottom: 3px solid #000;
      }

      .social-btn {
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 10px;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: white;
        font-size: 14px;
        margin-bottom: 10px;
      }
    </style>
  </head>
  <body>
  <div class="login-card">
    <div class="mb-3">
      <img
        src="{%  static 'img/logo_monagua.png' %}"
        alt="Monagua Logo"
        style="width: 100px"
      />
    </div>

    <h2 class="h4 fw-bold mb-1">Bienvenido de nuevo</h2>
    <p class="text-muted small mb-4">
      Ingresa tus datos para acceder a tu experiencia.
    </p>

    <div class="nav-tabs-custom">
      <a href="#" class="nav-item-custom active-tab">Iniciar Sesión</a>
      <a href="{% url 'registro' %}" class="nav-item-custom">Regístrate</a>
    </div>
     <form action="{% url 'login' %}" method="POST">
    {% csrf_token %}


      <div class="text-start mb-3">
        <label for="email" class="form-label small fw-bold">Correo Electrónico</label>
        <div class="input-group">
          <input
            type="email"
            id="email"
            name="username"
            class="form-control bg-light"
            placeholder="nombre@ejemplo.com"
            required
          />
          <span class="input-group-text bg-light border-start-0">
            <i class="bi bi-envelope"></i>
          </span>
        </div>
      </div>

      <div class="text-start mb-4">
        <div class="d-flex justify-content-between">
          <label for="password" class="form-label small fw-bold">Contraseña</label>
        
          <a href="{% url 'password_reset' %}" class="small text-decoration-none text-muted">¿Olvidaste tu contraseña?</a>
        </div>
        <div class="input-group">
          <input
            type="password"
            id="password"
            name="password"
            class="form-control bg-light"
            placeholder="Ingresa tu contraseña"
            required
          />
          <span class="input-group-text bg-light border-start-0">
            <i class="bi bi-eye-slash"></i>
          </span>
        </div>
      </div>

      <button type="submit" class="btn btn-iniciar w-100 mb-4">
        Iniciar Sesión
      </button>
    </form>

    <p class="small text-muted">
      ¿No tienes una cuenta?
      <a href="{% url 'registro' %}" class="fw-bold text-dark text-decoration-none">Regístrate Ahora</a>
    </p>
  </div>
</body>
</html>
