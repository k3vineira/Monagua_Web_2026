{% extends "base.html" %}
{% load static %}
{% load crispy_forms_tags %}

{% block content %}

<div class="container-fluid py-3">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm border-0 mb-4">
                
                <div class="card-header bg-warning text-white py-3">
                    <h5 class="mb-0 fw-bold"> Crear Nueva Promoción</h5>
                </div>
                
                <div class="card-body p-4">
                    <form method="POST">
                        {% csrf_token %}
                        
                        {# Renderiza los campos de PromocionForm (nombre, descuento, fecha_inicio, fecha_fin, etc.) #}
                        {{ form|crispy }}
                        
                        <hr class="my-4 text-secondary opacity-25">

                        <div class="d-flex justify-content-end gap-2">
                            <a href="{% url 'crear_promocion' %}" class="btn btn-outline-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-warning">
                                 Guardar Promoción
                            </button>
                        </div>
                    </form>
                </div>

            </div>
        </div>
    </div>
