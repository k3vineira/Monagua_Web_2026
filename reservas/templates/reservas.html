{% extends "base.html" %}
{% load static %}

{% block content %}

<main class="container"style="margin-top: 100px;">
  <div class="row g-4 align-items-stretch justify-content-center mb-5">
    <div class="col-md-5">
      <div class="h-100 shadow-sm rounded-4 overflow-hidden border bg-light d-flex align-items-center justify-content-center">
        {% if paquete and paquete.imagen %}
          <img src="{{ paquete.imagen.url }}" class="img-full" style="object-fit: cover; width: 100%; height: 100%; min-height: 400px;" alt="{{ paquete.nombre }}" />
        {% else %}
          <img src="{% static 'img/paramo.png' %}" class="img-full" style="object-fit: cover; width: 100%; height: 100%; min-height: 400px;" alt="Paisaje por defecto" />
        {% endif %}
      </div>
    </div>

    <div class="col-md-5">
      <div class="card shadow-sm border h-100 card-reserva">
        <div class="card-header text-center py-3 bg-white border-0">
          <h4 class="mb-0 fw-bold header-reserva">Haz tu Reserva</h4>
          {% if paquete %}
            <p class="text-success fw-bold mb-0 mt-1 small">Estás reservando: {{ paquete.nombre }}</p>
          {% endif %}
        </div>
        <div class="card-body p-4 pt-0">
 
          <form action="{% url 'guardar_reserva' paquete.id %}" method="POST">
            {% csrf_token %}
            
            <div class="mb-3">
              <label class="form-label fw-bold subtitulo-formulario">Información Personal</label>
              <div class="row g-2">
                <div class="col-6">
                  <input type="text" class="form-control form-control-sm bg-light" value="{{ user.first_name }}" placeholder="Nombre" readonly />
                </div>
                <div class="col-6">
              
                  <input type="text" class="form-control form-control-sm bg-light" value="{{ user.last_name }}" placeholder="Apellido" readonly />
                </div>
              </div>
            </div>

            <div class="mb-2">
              <input type="email" class="form-control form-control-sm bg-light" value="{{ user.email }}" placeholder="Correo" readonly />
            </div>

            <div class="mb-3">
              <input type="tel" class="form-control form-control-sm bg-light" value="{{ user.telefono }}" placeholder="Teléfono" readonly max_length=15 />
            </div>

            <hr class="my-3 opacity-25" />

            <div class="mb-3">
              <label class="form-label fw-bold subtitulo-formulario">Detalles del Tour</label>
              <div class="row g-2">
                <div class="col-7">
                  <!-- Nombre del campo: fecha -->
                  <input type="date" name="fecha" class="form-control form-control-sm" required />
                </div>
                <div class="col-5">
                  <!-- Nombre del campo: numero_personas -->
                  <input type="number" name="numero_personas" class="form-control form-control-sm" placeholder="Personas" min="1" required />
                </div>
              </div>
            </div>

            <div class="form-check mb-3">
              <input class="form-check-input" type="checkbox" id="terminos" required />
              <label class="form-check-label small" for="terminos">
                Acepto <a href="#" class="text-decoration-none link-verde">términos</a>
              </label>
            </div>

            <div class="d-grid">
                <button class="btn btn-confirmar py-2 fw-bold w-100" type="submit">
                    Reservar ahora
                </button>
            </div>
          </form>

        </div>
      </div>
    </div>
  </div>
</main>
{% endblock %}
