{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Monagua</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .form-control,
        .form-select {
            border-color: #333;
        }
        
        .form-control:focus,
        .form-select:focus {
            border-color: #406d46;
            box-shadow: 0 0 0 0.25rem rgba(64, 109, 70, 0.25);
        }
        
        .btn-custom-green {
            background-color: #406d46;
            border-color: #406d46;
            color: white;
        }
        
        .btn-custom-green:hover {
            background-color: #2e4f32;
            color: white;
        }
        
        .text-custom-green {
            color: #406d46 !important;
        }
        
        #tarjetaRegistro {
            backdrop-filter: blur(5px);
        }
    </style>
</head>

<body class="d-flex flex-column justify-content-center align-items-center vh-100"
style="background: url('{% static 'img/FONDO.jpeg' %}') no-repeat center center fixed; background-size: cover;">
    <!-- TARJETA REGISTRO -->
    <div id="tarjetaRegistro" class="card p-3 rounded-4 border-0 shadow" style="width: 100%; max-width: 330px; background-color: rgba(255, 255, 255, 0.92);">

        <div class="d-flex justify-content-end mb-1">
            <button type="button" id="btnCerrar" class="btn-close"></button>
        </div>

        <div class="text-center mb-2">
           <img src="{% static 'img/image.png' %}" class="img-fluid" style="height: 70px; object-fit: contain;">
        </div>

        <h6 class="text-center mb-3 text-dark fw-normal">
            Crea Tu Cuenta Nueva
        </h6>

        <form id="formularioRegistro">

            <form method="POST">
            {% csrf_token %}

            <div class="mb-2">
                <input type="text" class="form-control rounded-pill" placeholder="Ingrese Sus Nombres" required>
            </div>

            <div class="mb-2">
                <input type="text" class="form-control rounded-pill" placeholder="Ingrese Sus Apellidos" required>
            </div>

            <div class="mb-2">
                <select class="form-select rounded-pill text-secondary" required>
                    <option value="" selected disabled>Tipo De Documento</option>
                    <option>Cédula de Ciudadanía</option>
                    <option>Tarjeta de Identidad</option>
                    <option>Pasaporte</option>
                </select>
            </div>

            <div class="mb-2">
                <input type="number" class="form-control rounded-pill" placeholder="Numero De Documento" required min="1">
            </div>

            <div class="mb-2">
                <input type="email" class="form-control rounded-pill" placeholder="Ingrese Correo" required>
            </div>

            <div class="mb-2">
                <input type="password" id="pass1" class="form-control rounded-pill" placeholder="Crea Contraseña" required minlength="6">
            </div>

            <div class="mb-3">
                <input type="password" id="pass2" class="form-control rounded-pill" placeholder="Valida Contraseña" required minlength="6">
            </div>

            <div id="mensajeError" class="text-danger text-center mb-2 d-none" style="font-size: 0.85em;">
                Las contraseñas no coinciden.
            </div>

            <div class="text-center mb-2">
                <button type="submit" class="btn btn-custom-green rounded-pill px-4 py-2">
                    Registrarse
                </button>
            </div>

            <div class="text-center">
                <small class="text-dark">¿Ya Tienes Cuenta?</small><br>
                <a href="/login/" class="text-custom-green text-decoration-none">
                    Iniciar Sesión
                </a>
            </div>

        </form>
    </div>

    <button id="btnAbrir" class="btn btn-custom-green rounded-pill px-4 mt-3 d-none">
        Crear Cuenta
    </button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const tarjeta = document.getElementById('tarjetaRegistro');
        const btnCerrar = document.getElementById('btnCerrar');
        const btnAbrir = document.getElementById('btnAbrir');
        const formulario = document.getElementById('formularioRegistro');
        const mensajeError = document.getElementById('mensajeError');

        btnCerrar.addEventListener('click', function() {
            tarjeta.classList.add('d-none');
            btnAbrir.classList.remove('d-none');
        });

        btnAbrir.addEventListener('click', function() {
            tarjeta.classList.remove('d-none');
            btnAbrir.classList.add('d-none');
        });

        formulario.addEventListener('submit', function(event) {
            event.preventDefault();

            const pass1 = document.getElementById('pass1').value;
            const pass2 = document.getElementById('pass2').value;

            if (pass1 !== pass2) {
                mensajeError.classList.remove('d-none');
            } else {
                mensajeError.classList.add('d-none');
               window.location.href = '/principal/';
            }
        });
    </script>

</body>

</html>
