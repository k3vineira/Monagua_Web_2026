{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contraseña Restablecida | Monagua</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'css/estilos.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5 text-center">
                <div class="card shadow border-0">
                    <div class="card-body p-5">
                        <div class="mb-4">
                            <i class="bi bi-check-circle-fill text-success" style="font-size: 4rem;"></i>
                        </div>
                        <h3 class="fw-bold text-brand mb-3">¡Cambio Exitoso!</h3>
                        <p class="text-muted mb-4">
                            Tu contraseña ha sido restablecida correctamente. Ya puedes utilizar tus nuevas credenciales para explorar nuestras experiencias de montaña.
                        </p>
                        <div class="d-grid">
                            <a href="{% url 'login' %}" class="btn btn-brand">Iniciar Sesión</a>
                        </div>
                    </div>
                </div>
                <div class="mt-4">
                    <img src="{% static 'img/logo_monagua.png' %}" width="60" alt="Logo Monagua" class="opacity-50">
                    <p class="small text-muted mt-2">
                        © 2026 Monagua - Experiencias de Montaña.
                    </p>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
